<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Barbeiro | Barbearia do Kauan</title>
    
    <script>
        if (localStorage.getItem('adminLogado') !== 'sim') {
            window.location.href = 'login.html';
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
        }
        body {
            margin: 0; padding: 0; font-family: 'Roboto', sans-serif;
            background-color: var(--dark-bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        header { 
            width: 100%; background-color: #000; padding: 20px 0; text-align: center; 
            border-bottom: 2px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        header h1 { font-family: 'Oswald', sans-serif; font-size: 2.5rem; color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-sair {
            background-color: transparent; border: 1px solid #ff5252; color: #ff5252; 
            padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.3s;
        }
        .btn-sair:hover { background-color: #ff5252; color: #fff; }

        .container { width: 95%; max-width: 1000px; margin-top: 30px; margin-bottom: 50px; }
        
        .dashboard-stats {
            display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap;
        }
        .stat-card {
            background-color: var(--card-bg); padding: 20px; border-radius: 10px; flex: 1; min-width: 200px;
            text-align: center; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-left: 5px solid var(--gold);
        }
        .stat-card h3 { color: #aaa; font-size: 1rem; margin: 0 0 10px 0; text-transform: uppercase; font-family: 'Oswald', sans-serif;}
        .stat-card .numero { font-size: 2.5rem; font-weight: bold; color: #fff; margin: 0; }
        .stat-card .numero span { color: var(--gold); font-size: 1.5rem; }

        .topo-lista { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .topo-lista h2 { font-family: 'Oswald', sans-serif; color: var(--gold); font-size: 1.8rem; margin: 0; }
        
        .btn-gold {
            padding: 10px 20px; background-color: var(--gold); color: #000;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-gold:hover { background-color: #e2b86a; transform: scale(1.05); }

        #lista-agendamentos { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .cliente-card {
            background-color: #111; border: 1px solid #333; border-radius: 8px; padding: 20px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .cliente-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .cliente-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background-color: var(--gold); }
        .cliente-card h3 { margin: 0 0 15px 0; color: var(--gold); font-family: 'Oswald', sans-serif; font-size: 1.4rem; }
        .cliente-card p { margin: 8px 0; font-size: 0.95rem; color: #ccc; }
        .cliente-card strong { color: #fff; }
        .cliente-card a { color: #4CAF50; text-decoration: none; font-weight: bold; }
        .cliente-card a:hover { text-decoration: underline; }
        
        .btn-excluir {
            width: 100%; padding: 12px; background-color: #1a1a1a; color: #4CAF50;
            border: 1px solid #4CAF50; border-radius: 5px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 15px; text-transform: uppercase;
        }
        .btn-excluir:hover { background-color: #4CAF50; color: #000; }
        
        .caixa-section {
            background-color: var(--card-bg); padding: 25px; border-radius: 10px; border: 1px solid #333;
            margin-top: 50px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between;
        }
        .caixa-inputs { display: flex; gap: 15px; flex-wrap: wrap; flex: 1; }
        .caixa-inputs div { display: flex; flex-direction: column; width: 100%; max-width: 200px; }
        .caixa-inputs label { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .caixa-inputs input { 
            padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; font-size: 1.1rem;
        }
        .caixa-inputs input:focus { outline: none; border-color: var(--gold); }
        
        #lista-historico { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .historico-item { 
            display: flex; justify-content: space-between; padding: 15px; 
            border-bottom: 1px solid #333; background: #111; border-radius: 5px; margin-bottom: 10px;
        }
        .historico-item span { font-weight: bold; font-size: 1.1rem; }
        .historico-item .valor-verde { color: #4CAF50; }

        #mensagem { text-align: center; color: #888; font-style: italic; width: 100%; grid-column: 1 / -1; }
        footer { margin-top: auto; padding: 20px; font-size: 0.8rem; color: #555; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>Painel de Controle</h1>
        <button class="btn-sair" onclick="sair()">Desconectar</button>
    </header>

    <div class="container">
        <div class="dashboard-stats">
            <div class="stat-card">
                <h3>Agendamentos Pendentes</h3>
                <p class="numero" id="total-clientes">0</p>
            </div>
            <div class="stat-card">
                <h3>Previsão de Faturamento</h3>
                <p class="numero"><span>R$</span> <span id="total-faturamento">0,00</span></p>
            </div>
        </div>

        <div class="topo-lista">
            <h2>Próximos Clientes</h2>
            <button class="btn-gold" onclick="carregarAgendamentos()">🔄 Atualizar</button>
        </div>
        
        <div id="lista-agendamentos">
            <p id="mensagem">Carregando dados do servidor...</p>
        </div>

        <div class="topo-lista" style="margin-top: 60px;">
            <h2>💰 Lançar Valor Extra</h2>
        </div>
        
        <div class="caixa-section">
            <div class="caixa-inputs">
                <div>
                    <label>Data:</label>
                    <input type="date" id="caixa-data" required>
                </div>
                <div>
                    <label>Valor Extra (R$):</label>
                    <input type="number" id="caixa-valor" step="0.01" placeholder="Ex: Produto, gorjeta..." required>
                </div>
            </div>
            <button class="btn-gold" style="padding: 15px 30px; font-size: 1.1rem;" onclick="salvarCaixa()">Somar ao Caixa</button>
        </div>

        <div class="topo-lista" style="margin-top: 40px;">
            <h2>📋 Histórico de Faturamento (Automático)</h2>
            <button class="btn-gold" style="padding: 5px 15px; font-size: 0.9rem;" onclick="carregarHistorico()">🔄 Recarregar Histórico</button>
        </div>
        
        <div id="lista-historico">
            <p style="color: #888; font-style: italic;">Carregando histórico...</p>
        </div>

    </div>

    <footer>
        &copy; 2026 Barbearia do Kauan - Sistema de Gestão Interno
    </footer>

    <script>
        document.getElementById('caixa-data').value = new Date().toISOString().split('T')[0];

        function sair() {
            localStorage.removeItem('adminLogado');
            window.location.href = 'login.html';
        }

        async function carregarAgendamentos() {
            const divLista = document.getElementById('lista-agendamentos');
            const numClientes = document.getElementById('total-clientes');
            const numFaturamento = document.getElementById('total-faturamento');
            
            divLista.innerHTML = '<p id="mensagem">Atualizando banco de dados...</p>';

            try {
                const resposta = await fetch('/agendamentos');
                const agendamentos = await resposta.json();

                divLista.innerHTML = ''; 
                numClientes.innerText = agendamentos.length;

                if (agendamentos.length === 0) {
                    divLista.innerHTML = '<p id="mensagem">Sua agenda está livre no momento.</p>';
                    numFaturamento.innerText = "0,00";
                    return;
                }

                let faturamentoCalculado = 0;

                agendamentos.forEach(a => {
                    let dataF = a.data.replace('T', ' às ');
                    let valor = 0;
                    if(a.servico.includes("35,00")) valor = 35;
                    if(a.servico.includes("55,00")) valor = 55;
                    if(a.servico.includes("20,00")) valor = 20;
                    if(a.servico.includes("15,00")) valor = 15;
                    if(a.servico.includes("80,00")) valor = 80;
                    
                    faturamentoCalculado += valor;
                    
                    let linkZap = a.telefone ? `<a href="https://wa.me/55${a.telefone.replace(/\D/g, '')}" target="_blank">${a.telefone}</a>` : "Sem número";

                    const divCard = document.createElement('div');
                    divCard.className = 'cliente-card';
                    divCard.innerHTML = `
                        <h3>${a.nome}</h3>
                        <p><strong>📱 WhatsApp:</strong> ${linkZap}</p>
                        <p><strong>📅 Data:</strong> ${dataF}</p>
                        <p><strong>✂️ Serviço:</strong> ${a.servico}</p>
                        <button class="btn-excluir" onclick="excluir(${a.id}, ${valor})">✔ Concluir Atendimento</button>
                    `;
                    divLista.appendChild(divCard);
                });

                numFaturamento.innerText = faturamentoCalculado.toFixed(2).replace('.', ',');

            } catch (erro) {
                divLista.innerHTML = '<p id="mensagem" style="color: #FF5252;">Erro de comunicação com o servidor.</p>';
            }
        }

        // AGORA A FUNÇÃO RECEBE O VALOR TAMBÉM
        async function excluir(id, valorServico) {
            if (!confirm("Confirmar atendimento? O valor do serviço será somado no caixa de hoje automaticamente.")) return;
            try {
                // 1. Remove da agenda
                const res = await fetch(`/agendamentos/${id}`, { method: 'DELETE' });
                
                if (res.ok) {
                    // 2. Se deu certo, soma o valor no faturamento do dia automaticamente!
                    if(valorServico > 0) {
                        const dataHoje = new Date().toISOString().split('T')[0];
                        await fetch('/faturamentos', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ data: dataHoje, valor: parseFloat(valorServico) })
                        });
                    }
                    
                    carregarAgendamentos(); // Atualiza os cartões
                    setTimeout(carregarHistorico, 500); // Dá um tempinho e atualiza o histórico ali embaixo
                } else {
                    alert("Erro ao concluir.");
                }
            } catch (e) {
                alert("Erro de conexão.");
            }
        }

        // Para lançamentos manuais (ex: vendeu uma pomada)
        async function salvarCaixa() {
            const dataInput = document.getElementById('caixa-data').value;
            const valorInput = document.getElementById('caixa-valor').value;

            if(!dataInput || !valorInput) {
                alert("Por favor, preencha o valor!");
                return;
            }

            try {
                const res = await fetch('/faturamentos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: dataInput, valor: parseFloat(valorInput) })
                });

                if(res.ok) {
                    alert("✅ Valor adicionado ao caixa do dia!");
                    document.getElementById('caixa-valor').value = ''; 
                    carregarHistorico(); 
                } else {
                    alert("❌ Erro ao salvar faturamento.");
                }
            } catch(e) {
                alert("Erro de conexão ao salvar caixa.");
            }
        }

        async function carregarHistorico() {
            const divHistorico = document.getElementById('lista-historico');
            divHistorico.innerHTML = '<p style="color: #888; font-style: italic;">Atualizando histórico...</p>';

            try {
                const resposta = await fetch('/faturamentos');
                const historico = await resposta.json();

                divHistorico.innerHTML = '';

                if(historico.length === 0) {
                    divHistorico.innerHTML = '<p style="color: #888; font-style: italic;">Nenhum faturamento salvo ainda.</p>';
                    return;
                }

                historico.forEach(item => {
                    let partesData = item.data.split('-');
                    let dataFormatada = partesData.length === 3 ? `${partesData[2]}/${partesData[1]}/${partesData[0]}` : item.data;
                    
                    const divItem = document.createElement('div');
                    divItem.className = 'historico-item';
                    divItem.innerHTML = `
                        <span>📅 ${dataFormatada}</span>
                        <span class="valor-verde">R$ ${parseFloat(item.valor).toFixed(2).replace('.', ',')}</span>
                    `;
                    divHistorico.appendChild(divItem);
                });

            } catch (erro) {
                divHistorico.innerHTML = '<p style="color: #FF5252;">Erro ao carregar histórico.</p>';
            }
        }

        carregarAgendamentos();
        carregarHistorico();
    </script>
</body>
</html>
